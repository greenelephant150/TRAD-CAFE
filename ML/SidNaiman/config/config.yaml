# SID Method Trading System - Main Configuration File
# ============================================================================

# System Settings
system:
  name: "SID Method Trading System"
  version: "3.0.0"
  environment: "development"  # development, testing, production
  log_level: "INFO"           # DEBUG, INFO, WARNING, ERROR
  data_directory: "/home/grct/Forex_Parquet"
  model_directory: "/mnt2/Trading-Cafe/ML/SNaiman2/ai/trained_models/"
  results_directory: "backtest_results/"

# ============================================================================
# SID Method Core Parameters (Wave 1)
# ============================================================================
sid_method:
  rsi_oversold: 30
  rsi_overbought: 70
  rsi_target: 50
  prefer_macd_cross: true
  earnings_buffer_days: 14
  default_risk_percent: 1.0
  min_risk_percent: 0.5
  max_risk_percent: 2.0
  max_active_trades: 5

# ============================================================================
# Wave 2: Live Session Parameters
# ============================================================================
live_sessions:
  use_market_context: true
  use_pattern_confirmation: true
  use_divergence: true
  divergence_lookback: 20
  pattern_lookback: 30
  market_trend_lookback: 50

# ============================================================================
# Wave 3: Academy Support Session Parameters
# ============================================================================
academy_support:
  strict_rsi: true                    # Exact 30/70, no "near"
  stop_pips_default: 5                # For non-Yen pairs
  stop_pips_yen: 10                   # For Yen pairs
  min_pattern_candles: 7
  min_confidence_score: 0.5
  min_quality_score: 40.0
  use_session_filter: true
  use_zone_quality: true

# ============================================================================
# Risk Management
# ============================================================================
risk_management:
  max_consecutive_losses: 3
  max_daily_loss_percent: 5.0
  max_weekly_loss_percent: 10.0
  max_monthly_loss_percent: 20.0
  max_drawdown_percent: 20.0
  
  # Correlation management
  max_correlated_trades: 2
  correlation_threshold: 0.7
  max_sector_exposure_percent: 25.0
  
  # News filtering
  earnings_buffer_hours: 24
  high_impact_buffer_hours: 4
  medium_impact_buffer_hours: 2
  
  # Time filtering
  allowed_sessions: ["overlap", "us", "london"]
  blocked_sessions: ["asian"]
  optimal_entry_start: "12:30"
  optimal_entry_end: "15:00"

# ============================================================================
# Trading Sessions (GMT)
# ============================================================================
sessions:
  asian:
    start: "00:00"
    end: "07:00"
    suitability: "low"
  london:
    start: "07:00"
    end: "16:00"
    suitability: "medium"
  us:
    start: "12:00"
    end: "21:00"
    suitability: "high"
  overlap:
    start: "12:00"
    end: "16:00"
    suitability: "very_high"

# ============================================================================
# Broker Configuration
# ============================================================================
broker:
  name: "OANDA"
  environment: "practice"  # practice, live
  account_id: "101-004-35778624-001"
  api_key: "${OANDA_API_KEY}"  # Load from environment variable
  base_url_practice: "https://api-fxpractice.oanda.com/v3"
  base_url_live: "https://api-fxtrade.oanda.com/v3"

# ============================================================================
# ML Training Configuration
# ============================================================================
training:
  target_horizons: [5, 10, 20]
  target_types: ["direction", "rsi_50", "sma_50"]
  test_size: 0.2
  validation_size: 0.1
  max_samples: 200000
  use_gpu: true
  models: ["random_forest", "xgboost", "lightgbm"]
  
  # Hyperparameters
  random_forest:
    n_estimators: 100
    max_depth: 15
    min_samples_split: 5
  xgboost:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
  lightgbm:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1

# ============================================================================
# Backtesting Configuration
# ============================================================================
backtesting:
  initial_balance: 10000.0
  commission_per_trade: 0.0
  slippage_pips: 0.0
  max_open_trades: 3
  save_trades: true
  save_metrics: true

# ============================================================================
# Notification Settings
# ============================================================================
notifications:
  enabled: false
  email:
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    sender: ""
    recipient: ""
  telegram:
    bot_token: ""
    chat_id: ""

# ============================================================================
# Logging Configuration
# ============================================================================
logging:
  file: "logs/sid_method.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"